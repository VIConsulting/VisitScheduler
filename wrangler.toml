name = "visit-scheduler"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# After creating your KV namespace in the Cloudflare dashboard (or via
# `npx wrangler kv namespace create VISIT_SCHEDULER_KV`), paste the
# namespace ID below and remove the placeholder.

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
